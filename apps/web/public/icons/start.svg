<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <circle cx="20" cy="20" r="18" fill="#10b981" fill-opacity="0.10"/>
  <circle cx="20" cy="20" r="12" fill="none" stroke="#10b981" stroke-width="1.2" stroke-opacity="0.5">
    <animate attributeName="r" values="12;20" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.5;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="20" cy="20" r="12" fill="none" stroke="#10b981" stroke-width="1.2">
    <animate attributeName="r" values="12;20" dur="2s" begin="0.75s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.4;0" dur="2s" begin="0.75s" repeatCount="indefinite"/>
  </circle>
  <polygon points="17,13 17,27 30,20" fill="#10b981"/>
</svg>
