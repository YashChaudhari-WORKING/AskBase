<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <circle cx="20" cy="20" r="18" fill="#64748b" fill-opacity="0.10"/>
  <circle cx="20" cy="20" r="12" fill="none" stroke="#64748b" stroke-width="1.5" stroke-opacity="0.4"/>
  <circle cx="20" cy="20" r="12" fill="none" stroke="#64748b" stroke-width="1.5"
          stroke-dasharray="75.4" stroke-dashoffset="75.4" stroke-linecap="round">
    <animate attributeName="stroke-dashoffset" values="75.4;0" dur="1.8s" fill="freeze" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <polyline points="13,20 18,26 27,14" fill="none" stroke="#64748b" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"
            stroke-dasharray="22" stroke-dashoffset="22">
    <animate attributeName="stroke-dashoffset" values="22;0" dur="0.5s" begin="1.2s" fill="freeze" repeatCount="indefinite"/>
  </polyline>
</svg>
