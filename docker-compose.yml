version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: askbase_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: askbase
      POSTGRES_PASSWORD: askbase
      POSTGRES_DB: askbase
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U askbase"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: askbase_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
